<!DOCTYPE html>
<html>
<body>

<input id="followers" placeholder="Followers">
<input id="hashtags" placeholder="Hashtags">
<button onclick="predict()">Predict</button>

<p id="result"></p>

<script>
function predict(){
fetch("http://127.0.0.1:5000/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
follower_count:followers.value,
hashtags_count:hashtags.value,
likes:500,
comments:50,
shares:20,
saves:30,
caption_length:100
})
})
.then(r=>r.json())
.then(d=>{
document.getElementById("result").innerText =
"Predicted Reach: " + d.predicted_reach;
})
.catch(err=>console.log(err));
}
</script>

</body>
</html>
